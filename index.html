<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixNow - Chọn vai trò</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fixblue: '#14387d',
                        fixorange: '#ff8200',
                    }
                }
            }
        }
    </script>
</head>

<body class="min-h-screen bg-gray-100 flex items-center justify-center px-4">
    <main class="w-full max-w-xl bg-white rounded-2xl shadow-lg p-8 text-center">
        <h1 class="text-4xl font-extrabold tracking-tight mb-2">
            <span class="text-fixblue">Fix</span><span class="text-fixorange">Now</span>
        </h1>
        <p class="text-gray-600 mb-8">Chọn trang bạn muốn truy cập</p>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <a href="./customer.html"
                class="block rounded-xl bg-fixorange text-white font-semibold py-4 hover:opacity-90 transition">
                Trang Khách hàng
            </a>
            <a href="./worker.html"
                class="block rounded-xl bg-fixblue text-white font-semibold py-4 hover:opacity-90 transition">
                Trang Thợ
            </a>
        </div>
    </main>
</body>

</html>
